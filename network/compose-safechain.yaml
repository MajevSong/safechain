  couchdb_contractor:
    container_name: couchdb_contractor
    image: couchdb:3.4.2
    environment: { COUCHDB_USER: admin, COUCHDB_PASSWORD: adminpw }
    ports: ["5984:5984"]
    networks: [safechain]
  couchdb_subcontractor:
    container_name: couchdb_subcontractor
    image: couchdb:3.4.2
    environment: { COUCHDB_USER: admin, COUCHDB_PASSWORD: adminpw }
    ports: ["6984:5984"]
    networks: [safechain]
  couchdb_insurer:
    container_name: couchdb_insurer
    image: couchdb:3.4.2
    environment: { COUCHDB_USER: admin, COUCHDB_PASSWORD: adminpw }
    ports: ["7984:5984"]
    networks: [safechain]
  couchdb_auditor:
    container_name: couchdb_auditor

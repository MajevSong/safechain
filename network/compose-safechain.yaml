  peer0.contractor.safechain.com:
    container_name: peer0.contractor.safechain.com
    image: hyperledger/fabric-peer:2.5.10
    labels: { service: hyperledger-fabric }
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.contractor.safechain.com
      - CORE_PEER_ADDRESS=peer0.contractor.safechain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.contractor.safechain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.contractor.safechain.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.contractor.safechain.com:7051
      - CORE_PEER_LOCALMSPID=ContractorMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.contractor.safechain.com:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0contractor"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_contractor:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - ./organizations/peerOrganizations/contractor.safechain.com/peers/peer0.contractor.safechain.com:/etc/hyperledger/fabric
      - ./peercfg:/etc/hyperledger/peercfg
      - peer0.contractor.safechain.com:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports: ["7051:7051", "9444:9444"]
    depends_on: [couchdb_contractor]
    networks: [safechain]

